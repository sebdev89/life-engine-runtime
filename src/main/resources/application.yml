spring:
  application:
    name: life-engine-runtime

  # life-engine-runtime owns DB `life_engine_runtime` (schema `public`). See
  # ../life-engine/docs/operations/11-database-ownership.md for the canonical matrix.
  #
  # R2DBC drives RunStore reads/writes; JDBC + Flyway runs migrations at boot.
  # Set `lifeengine.runtime.persistence.type=inmem` to disable persistence and
  # fall back to InMemoryRunStore (no DB required) — used by tests and local
  # dev without PostgreSQL.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/life_engine_runtime}
    username: ${SPRING_DATASOURCE_USERNAME:life}
    password: ${SPRING_DATASOURCE_PASSWORD:life}

  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5433/life_engine_runtime}
    username: ${SPRING_R2DBC_USERNAME:life}
    password: ${SPRING_R2DBC_PASSWORD:life}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5433/life_engine_runtime}
    user: ${SPRING_FLYWAY_USER:life}
    password: ${SPRING_FLYWAY_PASSWORD:life}
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8090}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  prometheus:
    metrics:
      export:
        enabled: true
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

lifeengine:
  runtime:
    fake-workflow:
      step-delay-ms: 50
    # Persistence backend: `r2dbc` (default, requires PostgreSQL + Flyway) or
    # `inmem` (volatile, no DB). Tests force `inmem` via application-test.yml.
    persistence:
      # Env var name matches Spring Boot's relaxed-binding form of
      # `lifeengine.runtime.persistence.type` so `LIFEENGINE_RUNTIME_PERSISTENCE_TYPE=inmem`
      # works whether it is set as a placeholder substitution here OR as a direct
      # property override at process boot.
      type: ${LIFEENGINE_RUNTIME_PERSISTENCE_TYPE:r2dbc}
    security:
      enabled: ${RUNTIME_SECURITY_ENABLED:true}
      # Phase-1 bridge: mint RUNTIME_VIEWER/OPERATOR/ADMIN from the JWT `role` claim and
      # ROLE_ADMIN. Required until life-engine-auth seeds RUNTIME_* in auth_role_permission
      # (tracked in docs/extraction/local-runbook.md). Set to `false` once the auth
      # Flyway migration ships proper RUNTIME_* permissions.
      derive-runtime-authorities-from-role: ${RUNTIME_DERIVE_AUTHORITIES_FROM_ROLE:true}
  security:
    jwt:
      # Local default MUST match life-engine-auth/src/main/resources/application-local.yml so
      # that auth-issued JWTs validate at the runtime without an explicit JWT_SECRET export.
      # Override via JWT_SECRET in any non-local environment.
      secret: ${JWT_SECRET:local-dev-jwt-hs512-secret-minimum-32-chars-long-xx}

runtime:
  tools:
    search:
      enabled: ${SEARCH_ENABLED:false}
      provider: ${SEARCH_PROVIDER:mock}
      tavily-api-key: ${TAVILY_API_KEY:}
      timeout: ${SEARCH_TIMEOUT:5s}
    rag:
      enabled: ${RAG_TOOL_ENABLED:false}
      base-url: ${RAG_BASE_URL:http://localhost:8095}
      default-collection-id: ${RAG_DEFAULT_COLLECTION_ID:}
      default-top-k: ${RAG_DEFAULT_TOP_K:5}
      timeout: ${RAG_TOOL_TIMEOUT:10s}
  llm:
    # --- Default / backward-compat bean (@Primary OpenAiCompatibleLlmClient) ---
    # All agents that have not yet been migrated to a role qualifier use this config.
    base-url: http://localhost:8000
    model: Qwen/Qwen2.5-Coder-3B-Instruct
    api-key: local-dev
    timeout: 30s
    # Sized for vLLM running with --max-model-len=2048. The crypto market-review
    # JSON outputs (bias/setup/invalidations, approved/warnings/riskLevel, response)
    # all fit well under 100 tokens; 192 leaves margin without ever truncating mid-JSON.
    # Pair with the lean marketContext projection in LoadCryptoMarketContextAgent so the
    # analyst stage stays comfortably under the 2048-token ceiling.
    max-tokens: 192
    temperature: 0

    # --- Multi-model roles (Fase 1 — beans wired, agents not migrated yet) ---
    # Override per-role via env vars: VLLM_FAST_BASE_URL, VLLM_CHAT_BASE_URL, etc.
    # See docs/specs/runtime-multi-model-llm.md §4.2 for full config reference.
    fast:
      base-url: ${VLLM_FAST_BASE_URL:http://localhost:8000}
      model: ${VLLM_FAST_MODEL:Qwen/Qwen2.5-Coder-3B-Instruct}
      api-key: ${VLLM_FAST_API_KEY:local-dev}
      timeout: 20s
      max-tokens: 256
      temperature: 0
    chat:
      base-url: ${VLLM_CHAT_BASE_URL:http://localhost:11434}
      model: ${VLLM_CHAT_MODEL:gemma3:4b}
      api-key: ${VLLM_CHAT_API_KEY:local-dev}
      timeout: 60s
      max-tokens: 512
      temperature: 0.3
    smart:
      base-url: ${VLLM_SMART_BASE_URL:http://localhost:8002}
      model: ${VLLM_SMART_MODEL:deepseek-ai/DeepSeek-R1-Distill-Qwen-14B}
      api-key: ${VLLM_SMART_API_KEY:local-dev}
      timeout: 180s
      max-tokens: 2048
      temperature: 0
    coding:
      base-url: ${VLLM_CODING_BASE_URL:http://localhost:8000}
      model: ${VLLM_CODING_MODEL:Qwen/Qwen2.5-Coder-3B-Instruct}
      api-key: ${VLLM_CODING_API_KEY:local-dev}
      timeout: 90s
      max-tokens: 1024
      temperature: 0

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{requestId:-},%X{correlationId:-},%X{runId:-},%X{workflowId:-}]"
