name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build + test (java 21, ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Show toolchain
        run: |
          java -version
          mvn -v

      # ---------------------------------------------------------------------------
      # Compile gate — fast feedback before the test lane runs.
      # ---------------------------------------------------------------------------
      - name: Compile (main + test sources)
        run: mvn -B -ntp -DskipTests test-compile

      # ---------------------------------------------------------------------------
      # Default test lane.
      #
      # The unit/WebFlux suite is fully hermetic: persistence is forced to the
      # in-memory RunStore via application-test.yml and LLM calls use MockWebServer
      # so no PostgreSQL / vLLM is required here.
      #
      # The R2DBC integration test (R2dbcRunStoreTest) starts an ephemeral
      # postgres:16-alpine via Testcontainers when a Docker daemon is reachable.
      # GitHub-hosted ubuntu-latest runners ship Docker, so this lane exercises the
      # full persistence path. On runners without Docker (rare), Testcontainers
      # fails fast — we do NOT silently skip; an opt-out is a deliberate, separate
      # workflow change rather than an accidental green build.
      # ---------------------------------------------------------------------------
      - name: Run tests (mvn test)
        run: mvn -B -ntp test

      # ---------------------------------------------------------------------------
      # On failure: publish Surefire reports so the failing test, stack trace, and
      # captured runtime logs are recoverable from the run summary.
      # ---------------------------------------------------------------------------
      - name: Upload Surefire reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            target/surefire-reports/**
            target/site/surefire-report.html
          if-no-files-found: ignore
          retention-days: 14

  docker-publish:
    name: docker build + push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Immutable sha- tags only. 'latest' is a moving pointer and is banned across the platform
      # (KAN-193 no-latest guard); deploys resolve by digest/sha, never by latest. metadata-action still
      # stamps org.opencontainers.image.revision=<sha> into the labels, so the image keeps its OCI revision.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Real git identity for /actuator/info: the build context has no .git, so pass it explicitly.
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            GIT_COMMIT_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
